<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Japan Summer 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f4f1e8; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    /* Custom map pin */
    .map-pin {
      width: 34px; height: 34px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .map-pin-num {
      position: relative; z-index: 2;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--c);
      color: white; font-weight: 700; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      border: 2.5px solid #fbfaf5;
      box-shadow: 0 2px 8px rgba(40,30,15,0.35);
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
    }
    .map-pin-ring {
      position: absolute; inset: 0; border-radius: 50%;
      background: var(--c);
      opacity: 0.2;
      animation: ping 2.6s ease-out infinite;
    }
    @keyframes ping {
      0% { transform: scale(0.7); opacity: 0.35; }
      80% { transform: scale(1.6); opacity: 0; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* Leaflet popup polish */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 6px 24px -6px rgba(40,30,15,0.35) !important;
      border: 1px solid #e2dfd6 !important;
    }
    .leaflet-popup-content { margin: 12px 14px !important; }
    .leaflet-popup-tip { box-shadow: none !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #d6d2c4; border-radius: 5px; border: 2px solid #f4f1e8; }
    ::-webkit-scrollbar-thumb:hover { background: #bcb6a8; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Reset button defaults so our inline styles win consistently */
    button { font: inherit; }

    /* Responsive: stack map side panel below on narrow */
    @media (max-width: 760px) {
      .map-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="map.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
